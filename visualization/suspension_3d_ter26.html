<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TER26 · Suspension 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0a0e1a;--card:rgba(18,24,42,0.92);--surf:#151b2e;--cyan:#00c8f5;
    --cyan35:rgba(0,200,245,0.35);--cyan15:rgba(0,200,245,0.15);--cyan08:rgba(0,200,245,0.08);
    --red:#ff4060;--green:#23d160;--amber:#ffb020;--white:#e8ecf4;
    --tb:#d0d8ea;--tm:#8090b0;--bdr:rgba(0,200,245,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);overflow:hidden;font-family:'JetBrains Mono',monospace;color:var(--tb);width:100vw;height:100vh}
  #c3d{width:100%;height:100%;position:absolute;top:0;left:0}
  .hud{position:absolute;pointer-events:auto;z-index:10}

  /* ── Top bar ── */
  .top-bar{top:0;left:0;right:0;height:28px;background:linear-gradient(180deg,rgba(0,200,245,0.08),transparent);
    display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--cyan08)}
  .logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:2.5px;
    color:var(--cyan);text-transform:uppercase}
  .logo span{font-weight:400;color:var(--tm);letter-spacing:1.5px;font-size:11px}

  /* ── KPI strip ── */
  .ks{top:32px;left:10px;right:200px;display:flex;gap:3px;flex-wrap:wrap}
  .kpi{background:var(--card);border:1px solid rgba(0,200,245,0.12);border-radius:4px;
    padding:5px 9px;min-width:90px;flex:1;backdrop-filter:blur(8px)}
  .kl{font-size:8px;color:var(--tm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1px}
  .kv{font-size:18px;font-weight:600;font-family:'Rajdhani',sans-serif;color:var(--white);line-height:1}
  .ku{font-size:10px;color:var(--tm);font-weight:400;margin-left:2px}

  /* ── View preset buttons ── */
  .vp{top:34px;right:10px;display:flex;flex-direction:column;gap:3px}
  .vb{background:var(--card);border:1px solid var(--bdr);border-radius:4px;color:var(--tm);
    font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;padding:5px 10px;
    cursor:pointer;transition:all .15s;text-transform:uppercase;backdrop-filter:blur(8px);
    text-align:center;min-width:72px}
  .vb:hover{color:var(--cyan);border-color:var(--cyan)}
  .vb.on{color:var(--cyan);border-color:var(--cyan);background:var(--cyan15)}

  /* ── Telemetry panel ── */
  .tele{bottom:56px;left:10px;background:var(--card);border:1px solid var(--bdr);
    border-radius:5px;padding:6px 10px;font-size:9px;line-height:1.6;backdrop-filter:blur(8px);min-width:160px}
  .tele .tt{font-size:10px;font-weight:600;color:var(--cyan);margin-bottom:2px;letter-spacing:1.5px;
    font-family:'Rajdhani',sans-serif}
  .tr{display:flex;justify-content:space-between;gap:10px;color:var(--tm)}
  .tr .tv{color:var(--tb);font-weight:500}

  /* ── Timeline bar ── */
  .tl{bottom:0;left:0;right:0;height:40px;background:var(--card);border-top:1px solid var(--cyan08);
    display:flex;align-items:center;gap:8px;padding:0 12px;backdrop-filter:blur(8px)}
  .tl button{background:var(--surf);border:1px solid var(--bdr);border-radius:4px;color:var(--cyan);
    font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;cursor:pointer;
    letter-spacing:1px;transition:all .15s}
  .tl button:hover{background:var(--cyan15)}
  .tl button.active{background:var(--cyan);color:var(--bg)}
  .tl .sl{flex:1;display:flex;align-items:center;gap:6px;color:var(--tm);font-size:9px;letter-spacing:0.5px}
  .tl .sl label{white-space:nowrap}
  .tl input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:var(--surf);
    border-radius:2px;outline:0;cursor:pointer}
  .tl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
    border-radius:50%;background:var(--cyan);cursor:pointer;box-shadow:0 0 6px var(--cyan35)}
  .tl .timer{color:var(--cyan);font-size:10px;font-weight:600;font-family:'Rajdhani',sans-serif;
    letter-spacing:1px;min-width:80px;text-align:center}
  .tl .spd{color:var(--tm);font-size:9px;min-width:42px;text-align:center}
  .tl .tog{display:flex;gap:3px}
  .tl .tb{background:var(--surf);border:1px solid rgba(0,200,245,0.15);border-radius:3px;
    color:var(--tm);font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 7px;
    cursor:pointer;letter-spacing:1px;transition:all .15s}
  .tl .tb:hover{color:var(--cyan);border-color:var(--cyan)}
  .tl .tb.on{color:var(--cyan);border-color:var(--cyan)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="c3d"></div>

<!-- HUD -->
<div class="hud top-bar">
  <div class="logo">TECNUN eRACING <span>· Suspension 3D · TER26</span></div>
</div>
<div class="hud ks" id="kpis">
  <div class="kpi"><div class="kl">Roll</div><div class="kv" id="k-roll">0.00<span class="ku">°</span></div></div>
  <div class="kpi"><div class="kl">Pitch</div><div class="kv" id="k-pitch">0.00<span class="ku">°</span></div></div>
  <div class="kpi"><div class="kl">Z_FL</div><div class="kv" id="k-zfl">0.0<span class="ku">mm</span></div></div>
  <div class="kpi"><div class="kl">Z_FR</div><div class="kv" id="k-zfr">0.0<span class="ku">mm</span></div></div>
  <div class="kpi"><div class="kl">Fz_FL</div><div class="kv" id="k-fzfl">735<span class="ku">N</span></div></div>
  <div class="kpi"><div class="kl">Fz_FR</div><div class="kv" id="k-fzfr">735<span class="ku">N</span></div></div>
  <div class="kpi"><div class="kl">Ay</div><div class="kv" id="k-ay">0.00<span class="ku">G</span></div></div>
  <div class="kpi"><div class="kl">Ax</div><div class="kv" id="k-ax">0.00<span class="ku">G</span></div></div>
</div>

<div class="hud vp">
  <button class="vb on" id="btn-3q" onclick="preset('3q')">3/4 VIEW</button>
  <button class="vb" id="btn-front" onclick="preset('front')">FRONT</button>
  <button class="vb" id="btn-side" onclick="preset('side')">SIDE</button>
  <button class="vb" id="btn-top" onclick="preset('top')">TOP</button>
  <button class="vb" id="btn-rear" onclick="preset('rear')">REAR</button>
</div>

<div class="hud tele" id="telemetry">
  <div class="tt">LIVE TELEMETRY</div>
  <div class="tr"><span>Camber FL</span><span class="tv" id="t-cfl">-2.00°</span></div>
  <div class="tr"><span>Camber FR</span><span class="tv" id="t-cfr">-2.00°</span></div>
  <div class="tr"><span>Z_RL</span><span class="tv" id="t-zrl">0.0 mm</span></div>
  <div class="tr"><span>Z_RR</span><span class="tv" id="t-zrr">0.0 mm</span></div>
</div>

<div class="hud tl">
  <button id="btn-play" class="active" onclick="togglePlay()">▶ PLAY</button>
  <button onclick="resetAnim()">↺</button>
  <div class="sl">
    <label>TIMELINE</label>
    <input type="range" id="timeline" min="0" max="1000" value="0" oninput="seekAnim(this.value)"/>
  </div>
  <div class="timer" id="timer">T=0.00s</div>
  <div class="tog">
    <button class="tb on" id="m-combined" onclick="setManeuver('combined')">LAP</button>
    <button class="tb" id="m-skidpad" onclick="setManeuver('skidpad')">SKID</button>
    <button class="tb" id="m-brake" onclick="setManeuver('brake')">BRAKE</button>
    <button class="tb" id="m-chicane" onclick="setManeuver('chicane')">CHICANE</button>
  </div>
  <div class="spd" id="speed-lbl" onclick="cycleSpeed()" style="cursor:pointer">1.0×</div>
  <div class="tog">
    <button class="tb" id="btn-wire" onclick="toggleWire()">WIRE</button>
    <button class="tb on" id="btn-gnd" onclick="toggleGround()">GND</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// PROJECT-GP  ·  3D Suspension Dynamics Visualizer v3
// TER26 Formula Student 2026 — Monocoque · Double Wishbone · Pushrod
// ═══════════════════════════════════════════════════════════════════════════

// ── Vehicle Parameters (from vehicle_params.py) ──────────────────────────
const VP = {
  wheelbase: 1.550, trackF: 1.200, trackR: 1.180,
  lf: 0.8525, lr: 0.6975, hCG: 0.330,
  wheelRadius: 0.2032, tireWidth: 0.205, tireProfile: 0.05,
  hRcF: 0.040, hRcR: 0.060,
  springRateF: 35030, springRateR: 52540,
  mrF: 1.14, mrR: 1.16,
  cLowF: 1800, cLowR: 1600,
  sprungMass: 268.9, totalMass: 300.0,
  unsprungF: 7.74, unsprungR: 7.76,
  uprightHeight: 0.258,
  maxSteer: 0.35,           // rad — physical rack limit
  camberGainF: -0.80,       // deg/deg roll
  camberGainR: -0.65,
  staticCamberF: -2.0,      // deg
  staticCamberR: -1.5,
  Ix: 45.0, Iy: 85.0, Iz: 150.0,
};

// ── Maneuver profiles (quasi-static) ─────────────────────────────────────
// Each sample: [t, roll_deg, pitch_deg, steer_rad, ay_G, ax_G]
const MANEUVERS = {
  combined: generateCombinedLap(14.0, 200),
  skidpad:  generateSkidpad(8.0, 120),
  brake:    generateBrake(4.0, 80),
  accel:    generateAccel(5.0, 80),
  chicane:  generateChicane(6.0, 120),
};

function generateCombinedLap(dur, n) {
  const d = [];
  for (let i = 0; i < n; i++) {
    const t = (i / (n-1)) * dur;
    const p = t / dur;
    // Composite: accel → right turn → braking → left turn → chicane
    let roll=0, pitch=0, steer=0, ay=0, ax=0;
    if (p < 0.12) { // acceleration
      ax = 1.2 * Math.sin(p/0.12 * Math.PI);
      pitch = -0.4 * ax;
    } else if (p < 0.35) { // right turn
      const s = (p-0.12)/0.23;
      const env = Math.sin(s * Math.PI);
      ay = 1.35 * env;
      roll = 1.8 * env;
      steer = 0.18 * env;
      ax = -0.15;
      pitch = 0.03;
    } else if (p < 0.48) { // braking
      const s = (p-0.35)/0.13;
      ax = -2.0 * Math.sin(s * Math.PI);
      pitch = -0.6 * ax;
      ay = 0.2 * Math.sin(s * Math.PI * 2);
      roll = 0.25 * ay;
      steer = -0.03 * Math.sin(s * Math.PI * 2);
    } else if (p < 0.72) { // left turn
      const s = (p-0.48)/0.24;
      const env = Math.sin(s * Math.PI);
      ay = -1.5 * env;
      roll = -2.0 * env;
      steer = -0.22 * env;
      ax = -0.1;
    } else if (p < 0.88) { // chicane
      const s = (p-0.72)/0.16;
      ay = 1.1 * Math.sin(s * Math.PI * 2);
      roll = 1.5 * Math.sin(s * Math.PI * 2);
      steer = 0.15 * Math.sin(s * Math.PI * 2);
      ax = 0.3;
      pitch = -0.1;
    } else { // settle
      const s = (p-0.88)/0.12;
      roll = roll * (1-s);
    }
    // CLAMP steering to physical limit
    steer = Math.max(-VP.maxSteer, Math.min(VP.maxSteer, steer));
    d.push([t, roll, pitch, steer, ay, ax]);
  }
  return d;
}

function generateSkidpad(dur, n) {
  const d = [];
  for (let i = 0; i < n; i++) {
    const t = (i/(n-1))*dur;
    const p = t/dur;
    const ramp = Math.min(p*4, 1.0);
    const ay = 1.5 * ramp * (p < 0.5 ? 1 : -1);
    const roll = 2.0 * ramp * (p < 0.5 ? 1 : -1);
    const steer = Math.max(-VP.maxSteer, Math.min(VP.maxSteer, 0.25 * ramp * (p < 0.5 ? 1 : -1)));
    d.push([t, roll, 0, steer, ay, 0]);
  }
  return d;
}

function generateBrake(dur, n) {
  const d = [];
  for (let i = 0; i < n; i++) {
    const t = (i/(n-1))*dur;
    const p = t/dur;
    const ax = -2.2 * Math.sin(p * Math.PI);
    const pitch = 0.8 * Math.sin(p * Math.PI);
    d.push([t, 0, pitch, 0, 0, ax]);
  }
  return d;
}

function generateAccel(dur, n) {
  const d = [];
  for (let i = 0; i < n; i++) {
    const t = (i/(n-1))*dur;
    const p = t/dur;
    const ax = 1.6 * Math.sin(p * Math.PI);
    const pitch = -0.5 * Math.sin(p * Math.PI);
    d.push([t, 0, pitch, 0, 0, ax]);
  }
  return d;
}

function generateChicane(dur, n) {
  const d = [];
  for (let i = 0; i < n; i++) {
    const t = (i/(n-1))*dur;
    const p = t/dur;
    const ay = 1.3 * Math.sin(p * Math.PI * 3);
    const roll = 1.7 * Math.sin(p * Math.PI * 3);
    const steer = Math.max(-VP.maxSteer, Math.min(VP.maxSteer, 0.18 * Math.sin(p * Math.PI * 3)));
    d.push([t, roll, 0.1, steer, ay, -0.1]);
  }
  return d;
}

// ── Three.js globals ─────────────────────────────────────────────────────
let scene, camera, renderer, clock;
let bodyGroup, groundPlane;
let corners = { fl:{}, fr:{}, rl:{}, rr:{} };
let springs = { fl:null, fr:null, rl:null, rr:null };
let anim = {
  playing: true, time: 0, speed: 1.0,
  maneuver: 'combined', wireframe: false, showGround: true,
};

// Camera orbit
let camTheta = Math.PI * 0.28, camPhi = Math.PI * 0.22;
let camRadius = 3.6;
let camTarget = new THREE.Vector3(0, 0.18, 0);
let isDragging = false, isPanning = false;
let lastMouse = {x:0, y:0};
let targetTheta, targetPhi, targetRadius, targetTarget;
let camAnimating = false, camAnimT = 0;
let camStartTheta, camStartPhi, camStartRadius, camStartTarget;

// Materials
const MAT = {};

// ═════════════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════════════
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);
  scene.fog = new THREE.FogExp2(0x0a0e1a, 0.08);

  camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.05, 80);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.getElementById('c3d').appendChild(renderer.domElement);

  clock = new THREE.Clock();
  createMaterials();
  createLights();
  createGround();
  createVehicle();
  setupControls();
  updateCamera();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function createMaterials() {
  // Monocoque CFRP — dark carbon with subtle metallic
  MAT.monocoque = new THREE.MeshStandardMaterial({
    color: 0x1a1e28, metalness: 0.3, roughness: 0.55
  });
  MAT.monocoqueEdge = new THREE.MeshStandardMaterial({
    color: 0x2a3040, metalness: 0.5, roughness: 0.4
  });
  // Side panel accent
  MAT.sideAccent = new THREE.MeshStandardMaterial({
    color: 0x00a0d0, metalness: 0.6, roughness: 0.3, emissive: 0x003050, emissiveIntensity: 0.3
  });
  // Roll hoop / structural steel
  MAT.rollHoop = new THREE.MeshStandardMaterial({
    color: 0x606878, metalness: 0.85, roughness: 0.2
  });
  // Rear subframe (tubular)
  MAT.subframe = new THREE.MeshStandardMaterial({
    color: 0x505868, metalness: 0.8, roughness: 0.25
  });
  // Wishbones
  MAT.wishbone = new THREE.MeshStandardMaterial({
    color: 0x7a8098, metalness: 0.8, roughness: 0.25
  });
  MAT.wishboneUpper = new THREE.MeshStandardMaterial({
    color: 0x6070a0, metalness: 0.8, roughness: 0.25
  });
  // Upright
  MAT.upright = new THREE.MeshStandardMaterial({
    color: 0x8890a8, metalness: 0.7, roughness: 0.3
  });
  // Pushrod
  MAT.pushrod = new THREE.MeshStandardMaterial({
    color: 0xd0c040, metalness: 0.7, roughness: 0.3
  });
  // Spring
  MAT.spring = new THREE.MeshStandardMaterial({
    color: 0x00c8f5, metalness: 0.5, roughness: 0.4, emissive: 0x004060, emissiveIntensity: 0.4
  });
  // Damper
  MAT.damper = new THREE.MeshStandardMaterial({
    color: 0x404858, metalness: 0.8, roughness: 0.2
  });
  // Tire — dark rubber, slightly lifted from pure black for visibility
  MAT.tire = new THREE.MeshStandardMaterial({
    color: 0x252525, roughness: 0.82, metalness: 0.0
  });
  // Rim — lighter metallic so disc face reads clearly as wheel direction
  MAT.rim = new THREE.MeshStandardMaterial({
    color: 0x606878, metalness: 0.85, roughness: 0.15
  });
  // Nose / aero
  MAT.nose = new THREE.MeshStandardMaterial({
    color: 0x181c28, metalness: 0.2, roughness: 0.6
  });
  // Wing
  MAT.wing = new THREE.MeshStandardMaterial({
    color: 0x202830, metalness: 0.3, roughness: 0.5
  });
  // Floor
  MAT.floor = new THREE.MeshStandardMaterial({
    color: 0x101420, metalness: 0.2, roughness: 0.7
  });
  // CG marker
  MAT.cgMarker = new THREE.MeshStandardMaterial({
    color: 0xffb020, metalness: 0.5, roughness: 0.3, emissive: 0xff6000, emissiveIntensity: 0.4
  });
  // Wire overlay
  MAT.wire = new THREE.MeshBasicMaterial({
    color: 0x00c8f5, wireframe: true, transparent: true, opacity: 0.15
  });
}

function createLights() {
  scene.add(new THREE.AmbientLight(0x304060, 0.5));

  const key = new THREE.DirectionalLight(0xd0d8f0, 1.2);
  key.position.set(3, 5, 4);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.near = 0.5;
  key.shadow.camera.far = 15;
  key.shadow.camera.left = -3; key.shadow.camera.right = 3;
  key.shadow.camera.top = 3; key.shadow.camera.bottom = -3;
  scene.add(key);

  const fill = new THREE.DirectionalLight(0x4060a0, 0.4);
  fill.position.set(-2, 3, -2);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0x00c8f5, 0.3);
  rim.position.set(0, 2, -4);
  scene.add(rim);

  // Subtle ground bounce
  const bounce = new THREE.PointLight(0x102040, 0.3, 8);
  bounce.position.set(0, 0.05, 0);
  scene.add(bounce);
}

function createGround() {
  // Grid plane
  const gridSize = 12, gridDiv = 60;
  const grid = new THREE.GridHelper(gridSize, gridDiv, 0x0a1828, 0x0a1828);
  grid.material.opacity = 0.25;
  grid.material.transparent = true;
  grid.position.y = 0;
  scene.add(grid);
  groundPlane = grid;

  // Solid dark ground
  const gGeo = new THREE.PlaneGeometry(20, 20);
  const gMat = new THREE.MeshStandardMaterial({
    color: 0x080c16, roughness: 0.95, metalness: 0.0
  });
  const gMesh = new THREE.Mesh(gGeo, gMat);
  gMesh.rotation.x = -Math.PI/2;
  gMesh.position.y = -0.002;
  gMesh.receiveShadow = true;
  scene.add(gMesh);
}

// ═════════════════════════════════════════════════════════════════════════
// VEHICLE CONSTRUCTION
// ═════════════════════════════════════════════════════════════════════════

function makeTube(from, to, radius, mat, segments) {
  segments = segments || 6;
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(radius, radius, len, segments);
  geo.translate(0, len/2, 0);
  geo.rotateX(Math.PI/2);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(from);
  mesh.lookAt(to);
  mesh.castShadow = true;
  return mesh;
}

function createVehicle() {
  bodyGroup = new THREE.Group();
  bodyGroup.position.set(0, VP.hCG, 0); // CG at design height
  scene.add(bodyGroup);

  createMonocoque();
  createAero();
  createCGMarker();
  createAllCorners();
}

function createMonocoque() {
  // ── Main CFRP monocoque tub ──────────────────────────────────────────
  // Extends from front bulkhead (near front axle) to rear bulkhead (behind cockpit)
  // Shape: trapezoidal cross-section, wider at top, narrower at floor

  const tubLen = VP.wheelbase * 0.75; // monocoque tub length
  const tubStart = VP.lf - 0.15;     // starts just behind front axle
  const tubEnd = tubStart - tubLen;   // ends behind cockpit

  // Main tub — extruded trapezoidal cross section
  const shape = new THREE.Shape();
  const topW = 0.26, botW = 0.20, tubH = 0.22;
  // Cross section (Y-Z in local, will be extruded along X)
  shape.moveTo(-botW, -tubH * 0.45);
  shape.lineTo(botW, -tubH * 0.45);
  shape.lineTo(topW, tubH * 0.55);
  shape.lineTo(-topW, tubH * 0.55);
  shape.closePath();

  const extSettings = { depth: tubLen, bevelEnabled: true, bevelThickness: 0.008, bevelSize: 0.008, bevelSegments: 2 };
  const tubGeo = new THREE.ExtrudeGeometry(shape, extSettings);
  // Rotate so extrusion goes along X axis (forward)
  tubGeo.rotateY(-Math.PI/2);
  const tubMesh = new THREE.Mesh(tubGeo, MAT.monocoque);
  tubMesh.position.set(tubStart, 0, 0);
  tubMesh.castShadow = true;
  bodyGroup.add(tubMesh);

  // ── Side impact structures (SIS) ─────────────────────────────────────
  // Raised bumps along the sides of the monocoque
  for (const side of [-1, 1]) {
    const sisGeo = new THREE.BoxGeometry(tubLen * 0.6, 0.06, 0.04);
    const sis = new THREE.Mesh(sisGeo, MAT.sideAccent);
    sis.position.set(
      tubStart - tubLen * 0.35,
      0.06,
      side * (topW + 0.018)
    );
    sis.castShadow = true;
    bodyGroup.add(sis);
  }

  // ── Main roll hoop (behind cockpit) ──────────────────────────────────
  const rhRadius = 0.014;
  const rhHeight = 0.36;  // above monocoque top surface
  const rhWidth = topW * 0.85;
  const rhX = tubEnd + 0.05;

  // Vertical legs
  for (const side of [-1, 1]) {
    const leg = makeTube(
      new THREE.Vector3(rhX, tubH * 0.55, side * rhWidth),
      new THREE.Vector3(rhX, tubH * 0.55 + rhHeight, side * rhWidth * 0.7),
      rhRadius, MAT.rollHoop, 8
    );
    bodyGroup.add(leg);
  }
  // Top bar
  bodyGroup.add(makeTube(
    new THREE.Vector3(rhX, tubH * 0.55 + rhHeight, -rhWidth * 0.7),
    new THREE.Vector3(rhX, tubH * 0.55 + rhHeight, rhWidth * 0.7),
    rhRadius, MAT.rollHoop, 8
  ));
  // Rear bracing
  for (const side of [-1, 1]) {
    bodyGroup.add(makeTube(
      new THREE.Vector3(rhX, tubH * 0.55 + rhHeight, side * rhWidth * 0.7),
      new THREE.Vector3(rhX - 0.25, tubH * 0.55, side * rhWidth * 0.5),
      rhRadius * 0.8, MAT.rollHoop, 6
    ));
  }

  // ── Front roll hoop (windscreen equivalent) ──────────────────────────
  const frhX = tubStart - 0.15;
  const frhH = 0.22;
  for (const side of [-1, 1]) {
    bodyGroup.add(makeTube(
      new THREE.Vector3(frhX, tubH * 0.55, side * rhWidth * 0.8),
      new THREE.Vector3(frhX, tubH * 0.55 + frhH, side * rhWidth * 0.6),
      rhRadius * 0.75, MAT.rollHoop, 8
    ));
  }
  bodyGroup.add(makeTube(
    new THREE.Vector3(frhX, tubH * 0.55 + frhH, -rhWidth * 0.6),
    new THREE.Vector3(frhX, tubH * 0.55 + frhH, rhWidth * 0.6),
    rhRadius * 0.75, MAT.rollHoop, 8
  ));

  // ── Rear tubular subframe ────────────────────────────────────────────
  // Extends from rear bulkhead to rear axle — structural steel tubes
  const sfStart = tubEnd;
  const sfEnd = -VP.lr + 0.05;
  const sfW = 0.22;
  const sfH = 0.15;
  const sfR = 0.010;

  // Main rails (bottom)
  for (const side of [-1, 1]) {
    bodyGroup.add(makeTube(
      new THREE.Vector3(sfStart, -tubH * 0.3, side * sfW),
      new THREE.Vector3(sfEnd, -tubH * 0.25, side * sfW * 0.9),
      sfR, MAT.subframe, 6
    ));
  }
  // Top rails
  for (const side of [-1, 1]) {
    bodyGroup.add(makeTube(
      new THREE.Vector3(sfStart, sfH, side * sfW * 0.9),
      new THREE.Vector3(sfEnd, sfH * 0.8, side * sfW * 0.7),
      sfR, MAT.subframe, 6
    ));
  }
  // Cross members
  for (const x of [sfStart + 0.05, (sfStart+sfEnd)/2, sfEnd - 0.05]) {
    const f = (x - sfEnd) / (sfStart - sfEnd);
    const w = sfW * (0.9 + 0.1 * f);
    bodyGroup.add(makeTube(
      new THREE.Vector3(x, -tubH * 0.28, -w),
      new THREE.Vector3(x, -tubH * 0.28, w),
      sfR * 0.8, MAT.subframe, 6
    ));
  }
  // Diagonals
  bodyGroup.add(makeTube(
    new THREE.Vector3(sfStart, -tubH * 0.3, -sfW),
    new THREE.Vector3((sfStart+sfEnd)/2, sfH * 0.9, sfW * 0.85),
    sfR * 0.7, MAT.subframe, 6
  ));
  bodyGroup.add(makeTube(
    new THREE.Vector3(sfStart, -tubH * 0.3, sfW),
    new THREE.Vector3((sfStart+sfEnd)/2, sfH * 0.9, -sfW * 0.85),
    sfR * 0.7, MAT.subframe, 6
  ));

  // ── Floor plate (undertray) ──────────────────────────────────────────
  const floorGeo = new THREE.BoxGeometry(VP.wheelbase * 1.05, 0.006, 0.56);
  const floorMesh = new THREE.Mesh(floorGeo, MAT.floor);
  floorMesh.position.set(
    (VP.lf - VP.lr) / 2,
    -tubH * 0.45 - 0.003,
    0
  );
  bodyGroup.add(floorMesh);
}

function createAero() {
  // ── Nose cone ────────────────────────────────────────────────────────
  const noseLen = 0.50;
  const noseGeo = new THREE.CylinderGeometry(0.008, 0.14, noseLen, 20);
  noseGeo.rotateZ(-Math.PI/2);
  const nose = new THREE.Mesh(noseGeo, MAT.nose);
  nose.position.set(VP.lf + noseLen/2 - 0.05, -0.03, 0);
  nose.castShadow = true;
  bodyGroup.add(nose);

  // ── Front wing endplates ─────────────────────────────────────────────
  const fwX = VP.lf + noseLen + 0.05;
  for (const side of [-1, 1]) {
    const epGeo = new THREE.BoxGeometry(0.22, 0.10, 0.003);
    const ep = new THREE.Mesh(epGeo, MAT.wing);
    ep.position.set(fwX - 0.05, -VP.hCG + 0.12, side * 0.28);
    bodyGroup.add(ep);
  }
  // Front wing main plane
  const fwGeo = new THREE.BoxGeometry(0.18, 0.004, 0.54);
  const fw = new THREE.Mesh(fwGeo, MAT.wing);
  fw.position.set(fwX - 0.05, -VP.hCG + 0.10, 0);
  fw.rotation.z = 0.12;
  bodyGroup.add(fw);

  // ── Rear wing ────────────────────────────────────────────────────────
  const rwX = -VP.lr - 0.20;
  // Endplates (FS-spec: ~220mm chord × 350mm height)
  for (const side of [-1, 1]) {
    const epGeo = new THREE.BoxGeometry(0.22, 0.22, 0.003);
    const ep = new THREE.Mesh(epGeo, MAT.wing);
    ep.position.set(rwX + 0.01, 0.32, side * 0.26);
    bodyGroup.add(ep);
  }
  // Main plane
  const rwMain = new THREE.BoxGeometry(0.20, 0.005, 0.50);
  const rwm = new THREE.Mesh(rwMain, MAT.wing);
  rwm.position.set(rwX, 0.38, 0);
  rwm.rotation.z = -0.10;
  bodyGroup.add(rwm);
  // Second element (flap)
  const rw2 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.004, 0.48), MAT.wing);
  rw2.position.set(rwX + 0.05, 0.34, 0);
  rw2.rotation.z = -0.20;
  bodyGroup.add(rw2);
}

function createCGMarker() {
  // Small sphere at CG position (which is at bodyGroup origin = 0,0,0 in body frame)
  const geo = new THREE.SphereGeometry(0.018, 12, 8);
  const marker = new THREE.Mesh(geo, MAT.cgMarker);
  marker.position.set(0, 0, 0);
  bodyGroup.add(marker);

  // Weight distribution axis — thin line from front to rear axle through CG
  const wdGeo = new THREE.CylinderGeometry(0.003, 0.003, VP.wheelbase, 4);
  wdGeo.rotateZ(Math.PI/2);
  const wdLine = new THREE.Mesh(wdGeo, MAT.cgMarker);
  wdLine.position.set((VP.lf - VP.lr)/2, 0, 0);
  bodyGroup.add(wdLine);
}

// ═════════════════════════════════════════════════════════════════════════
// SUSPENSION CORNERS
// ═════════════════════════════════════════════════════════════════════════

function createCorner(name, xAxle, ySign, track, isFront) {
  const c = {};
  const yAxle = ySign * track / 2;
  const R = VP.wheelRadius;
  const tw = VP.tireWidth;
  const axleWorldY = 0; // Wheels are at ground level, not attached to body roll

  // ── Wheel assembly (in WORLD space, grounded) ────────────────────────
  c.wheelGroup = new THREE.Group();
  c.wheelGroup.position.set(xAxle, R, yAxle);
  scene.add(c.wheelGroup);

  // Steering pivot group (only front wheels steer)
  c.steerGroup = new THREE.Group();
  c.wheelGroup.add(c.steerGroup);

  // Tire (torus — standing upright, hole along Z = lateral)
  const tireGeo = new THREE.TorusGeometry(R, tw * 0.38, 16, 32);
  // tireGeo.rotateX(Math.PI/2);
  const tire = new THREE.Mesh(tireGeo, MAT.tire);
  tire.castShadow = true;
  c.steerGroup.add(tire);

  // Rim — solid disc face (CircleGeometry faces +Z by default = lateral = correct)
  const rimR = R * 0.72;
  const discGeo = new THREE.CircleGeometry(rimR, 20);
  // Outer face
  const discOut = new THREE.Mesh(discGeo, MAT.rim);
  discOut.position.z = ySign * tw * 0.18;
  if (ySign < 0) discOut.rotation.y = Math.PI; // flip to face outward
  c.steerGroup.add(discOut);
  // Inner face
  const discIn = new THREE.Mesh(discGeo.clone(), MAT.rim);
  discIn.position.z = -ySign * tw * 0.18;
  if (ySign > 0) discIn.rotation.y = Math.PI;
  c.steerGroup.add(discIn);

  // Hub center (small cylinder along Z)
  const hubGeo = new THREE.CylinderGeometry(0.022, 0.022, tw * 0.5, 10);
  hubGeo.rotateX(Math.PI/2);
  const hub = new THREE.Mesh(hubGeo, MAT.upright);
  c.steerGroup.add(hub);

  // Spokes (5-spoke pattern in the wheel face = XY plane)
  for (let a = 0; a < 5; a++) {
    const angle = (a / 5) * Math.PI * 2;
    const sLen = rimR * 0.9;
    const sGeo = new THREE.CylinderGeometry(0.005, 0.005, sLen, 4);
    sGeo.translate(0, sLen/2, 0);
    sGeo.rotateZ(-Math.PI/2);
    const spoke = new THREE.Mesh(sGeo, MAT.rim);
    spoke.rotation.z = angle;
    c.steerGroup.add(spoke);
  }

  // Upright — thin vertical rod behind wheel (not a visible box)
  const uprGeo = new THREE.CylinderGeometry(0.008, 0.008, VP.uprightHeight, 6);
  const upr = new THREE.Mesh(uprGeo, MAT.upright);
  upr.position.set(0, 0, -ySign * (tw * 0.30));
  c.steerGroup.add(upr);
  c.upright = upr;

  // ── Wishbone hardpoints (in BODY frame) ──────────────────────────────
  const axleKey = isFront ? 'f' : 'r';
  const hp = (window.TEAM_HARDPOINTS && window.TEAM_HARDPOINTS[axleKey]) || null;

  if (hp && hp.lca_in_f) {
      // 🏎️ USE REAL CAD HARDPOINTS FROM PYTHON
      // X = longitudinal (relative to axle), Y = vertical, Z = lateral
      c.loIB_f = new THREE.Vector3(xAxle + hp.lca_in_f[0], hp.lca_in_f[1], ySign * hp.lca_in_f[2]);
      c.loIB_r = new THREE.Vector3(xAxle + hp.lca_in_r[0], hp.lca_in_r[1], ySign * hp.lca_in_r[2]);
      c.upIB_f = new THREE.Vector3(xAxle + hp.uca_in_f[0], hp.uca_in_f[1], ySign * hp.uca_in_f[2]);
      c.upIB_r = new THREE.Vector3(xAxle + hp.uca_in_r[0], hp.uca_in_r[1], ySign * hp.uca_in_r[2]);
      
      c.loOB = new THREE.Vector3(xAxle + hp.lbj[0], hp.lbj[1], ySign * hp.lbj[2]);
      c.upOB = new THREE.Vector3(xAxle + hp.ubj[0], hp.ubj[1], ySign * hp.ubj[2]);
      
      c.bellcrankPivot = new THREE.Vector3(xAxle + hp.rocker_piv[0], hp.rocker_piv[1], ySign * hp.rocker_piv[2]);
  } else {
      // 🛑 FALLBACK GEOMETRY (If Python data is missing)
      const loIBz = -0.08, upIBz = 0.06;
      const loIBSpan = 0.18, upIBSpan = 0.14;
      
      c.loIB_f = new THREE.Vector3(xAxle + loIBSpan/2, loIBz, ySign * 0.16);
      c.loIB_r = new THREE.Vector3(xAxle - loIBSpan/2, loIBz, ySign * 0.16);
      c.upIB_f = new THREE.Vector3(xAxle + upIBSpan/2, upIBz, ySign * 0.14);
      c.upIB_r = new THREE.Vector3(xAxle - upIBSpan/2, upIBz, ySign * 0.14);
      c.loOB = new THREE.Vector3(xAxle, R - VP.uprightHeight * 0.4, yAxle - ySign * tw * 0.35);
      c.upOB = new THREE.Vector3(xAxle, R + VP.uprightHeight * 0.35, yAxle - ySign * tw * 0.35);
      c.bellcrankPivot = new THREE.Vector3(xAxle, 0.04, ySign * 0.13);
  }

  // Inboard pickups (body-attached, in bodyGroup local coords)
  c.loIB_f = new THREE.Vector3(xAxle + loIBSpan/2, loIBz, ySign * 0.16);
  c.loIB_r = new THREE.Vector3(xAxle - loIBSpan/2, loIBz, ySign * 0.16);
  c.upIB_f = new THREE.Vector3(xAxle + upIBSpan/2, upIBz, ySign * 0.14);
  c.upIB_r = new THREE.Vector3(xAxle - upIBSpan/2, upIBz, ySign * 0.14);

  // Outboard ball joints on upright (world space, updated each frame)
  c.loOB = new THREE.Vector3(xAxle, R - VP.uprightHeight * 0.4, yAxle - ySign * tw * 0.35);
  c.upOB = new THREE.Vector3(xAxle, R + VP.uprightHeight * 0.35, yAxle - ySign * tw * 0.35);

  // ── Wishbone tubes ───────────────────────────────────────────────────
  c.loWishF = makeTube(new THREE.Vector3(), new THREE.Vector3(), 0.008, MAT.wishbone);
  c.loWishR = makeTube(new THREE.Vector3(), new THREE.Vector3(), 0.008, MAT.wishbone);
  c.upWishF = makeTube(new THREE.Vector3(), new THREE.Vector3(), 0.007, MAT.wishboneUpper);
  c.upWishR = makeTube(new THREE.Vector3(), new THREE.Vector3(), 0.007, MAT.wishboneUpper);
  scene.add(c.loWishF, c.loWishR, c.upWishF, c.upWishR);

  // ── Pushrod ──────────────────────────────────────────────────────────
  c.pushrod = makeTube(new THREE.Vector3(), new THREE.Vector3(), 0.006, MAT.pushrod);
  scene.add(c.pushrod);

  // Bellcrank pivot (body-attached)
  c.bellcrankPivot = new THREE.Vector3(xAxle, 0.04, ySign * 0.13);

  // ── Spring (simplified as cylinder, updated each frame) ──────────────
  c.springMesh = createSpringMesh();
  scene.add(c.springMesh);

  c.xAxle = xAxle;
  c.ySign = ySign;
  c.yAxle = yAxle;
  c.track = track;
  c.isFront = isFront;
  c.name = name;

  return c;
}

function createSpringMesh() {
  // A spring visual: colored cylinder with segments suggesting coils
  const geo = new THREE.CylinderGeometry(0.012, 0.012, 0.12, 8);
  const mesh = new THREE.Mesh(geo, MAT.spring);
  mesh.castShadow = true;
  return mesh;
}

function createAllCorners() {
  corners.fl = createCorner('fl', VP.lf, 1, VP.trackF, true);
  corners.fr = createCorner('fr', VP.lf, -1, VP.trackF, true);
  corners.rl = createCorner('rl', -VP.lr, 1, VP.trackR, false);
  corners.rr = createCorner('rr', -VP.lr, -1, VP.trackR, false);
}

// ═════════════════════════════════════════════════════════════════════════
// KINEMATICS UPDATE (per-frame)
// ═════════════════════════════════════════════════════════════════════════

function updateSuspension(roll_deg, pitch_deg, steer_rad) {
  const roll_rad = roll_deg * Math.PI / 180;
  const pitch_rad = pitch_deg * Math.PI / 180;

  // Clamp steering to physical limit
  steer_rad = Math.max(-VP.maxSteer, Math.min(VP.maxSteer, steer_rad));

  // ── Update body group (rolls around roll axis at RC height) ──────────
  bodyGroup.rotation.z = roll_rad;
  bodyGroup.rotation.x = pitch_rad;

  // Body CG vertical offset from pitch/roll (small angle approx)
  bodyGroup.position.y = VP.hCG;

  // ── Compute per-corner wheel heights ─────────────────────────────────
  // Quasi-static: wheels stay on ground, body moves relative to them
  // Suspension travel = body point - wheel point projected vertically

  for (const [name, c] of Object.entries(corners)) {
    const isF = c.isFront;
    const yS = c.ySign;
    const tw = isF ? VP.trackF : VP.trackR;
    const xA = c.xAxle;

    // Suspension travel at this corner (positive = compression)
    // From body roll: z_roll = -(tw/2) * ySign * roll_rad
    // From body pitch: z_pitch = xAxle * pitch_rad (positive xAxle = front, pitch down = positive pitch_rad)
    const z_roll = -(tw/2) * yS * roll_rad;
    const z_pitch = xA * pitch_rad;
    const z_travel_m = z_roll + z_pitch; // positive = wheel moves up relative to body = compression

    // Wheel stays on ground, always at y = R
    c.wheelGroup.position.y = VP.wheelRadius;

    // ── Steering ───────────────────────────────────────────────────────
    if (isF) {
      // Simple Ackermann-ish: inner wheel turns more
      const ack = 0.0; // parallel steer (ackermann_factor = 0)
      c.steerGroup.rotation.y = steer_rad; // Z-up rotation = yaw = rotation around Y in Three.js
    } else {
      c.steerGroup.rotation.y = 0;
    }

    // ── Camber from roll ───────────────────────────────────────────────
    const camberGain = isF ? VP.camberGainF : VP.camberGainR;
    const staticCamber = isF ? VP.staticCamberF : VP.staticCamberR;
    const camber_deg = staticCamber + camberGain * roll_deg * yS;
    // Apply as tilt on the wheel assembly (around X axis in wheel local frame)
    c.steerGroup.rotation.x = camber_deg * Math.PI / 180;

    // ── Update wishbone geometry (deforming links) ─────────────────────
    // Outboard points move with wheel
    const wheelWorldPos = c.wheelGroup.position.clone();
    const uprightCenter = wheelWorldPos.clone();
    uprightCenter.z -= yS * VP.tireWidth * 0.35;

    const loOBWorld = new THREE.Vector3(
      xA, VP.wheelRadius - VP.uprightHeight * 0.4, c.yAxle - yS * VP.tireWidth * 0.35
    );
    const upOBWorld = new THREE.Vector3(
      xA, VP.wheelRadius + VP.uprightHeight * 0.35, c.yAxle - yS * VP.tireWidth * 0.35
    );

    // Inboard points follow body group transform
    const bodyMatrix = bodyGroup.matrixWorld;
    const loIBf_w = c.loIB_f.clone().applyMatrix4(bodyMatrix);
    const loIBr_w = c.loIB_r.clone().applyMatrix4(bodyMatrix);
    const upIBf_w = c.upIB_f.clone().applyMatrix4(bodyMatrix);
    const upIBr_w = c.upIB_r.clone().applyMatrix4(bodyMatrix);

    // Rebuild wishbone tubes
    updateTube(c.loWishF, loIBf_w, loOBWorld, 0.008);
    updateTube(c.loWishR, loIBr_w, loOBWorld, 0.008);
    updateTube(c.upWishF, upIBf_w, upOBWorld, 0.007);
    updateTube(c.upWishR, upIBr_w, upOBWorld, 0.007);

    // ── Pushrod (upright → bellcrank) ──────────────────
    // Attaches 25% of the way up the upright from the lower ball joint
    const prOB = loOBWorld.clone().lerp(upOBWorld, 0.25); 

    const bcPivot_w = c.bellcrankPivot.clone().applyMatrix4(bodyMatrix);
    updateTube(c.pushrod, prOB, bcPivot_w, 0.006);

    // ── Spring (from bellcrank to body mount) ──────────────────────────
    const sprMount_w = new THREE.Vector3(
      xA, 0.10, yS * 0.10
    ).applyMatrix4(bodyMatrix);
    const sprLen = bcPivot_w.distanceTo(sprMount_w);
    c.springMesh.position.copy(bcPivot_w).lerp(sprMount_w, 0.5);
    c.springMesh.scale.y = Math.max(0.3, sprLen / 0.12);
    c.springMesh.lookAt(sprMount_w);
    c.springMesh.rotateX(Math.PI/2);
  }
}

function updateTube(mesh, from, to, radius) {
  // Remove old geometry, rebuild
  if (mesh.geometry) mesh.geometry.dispose();
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  if (len < 0.001) return;
  const geo = new THREE.CylinderGeometry(radius, radius, len, 6);
  geo.translate(0, len/2, 0);
  geo.rotateX(Math.PI/2);
  mesh.geometry = geo;
  mesh.position.copy(from);
  mesh.lookAt(to);
}

// ═════════════════════════════════════════════════════════════════════════
// QUASI-STATIC PHYSICS FOR TELEMETRY
// ═════════════════════════════════════════════════════════════════════════

function computeTelemetry(roll_deg, pitch_deg, steer_rad, ay_G, ax_G) {
  const roll_rad = roll_deg * Math.PI / 180;
  const pitch_rad = pitch_deg * Math.PI / 180;
  const g = 9.81;
  const m = VP.totalMass;

  // Suspension travels (mm)
  const z_fl = (-(VP.trackF/2) * roll_rad + VP.lf * pitch_rad) * 1000;
  const z_fr = ( (VP.trackF/2) * roll_rad + VP.lf * pitch_rad) * 1000;
  const z_rl = (-(VP.trackR/2) * roll_rad - VP.lr * pitch_rad) * 1000;
  const z_rr = ( (VP.trackR/2) * roll_rad - VP.lr * pitch_rad) * 1000;

  // Vertical loads (simplified quasi-static)
  const Fz_static = m * g / 4;
  const dFz_lat = m * ay_G * g * VP.hCG / VP.trackF; // lateral load transfer
  const dFz_lon = m * ax_G * g * VP.hCG / VP.wheelbase;

  const Fz_fl = Fz_static * (VP.lr / VP.wheelbase * 2) - dFz_lat * 0.48 + dFz_lon * 0.48;
  const Fz_fr = Fz_static * (VP.lr / VP.wheelbase * 2) + dFz_lat * 0.48 + dFz_lon * 0.48;
  const Fz_rl = Fz_static * (VP.lf / VP.wheelbase * 2) - dFz_lat * 0.52 - dFz_lon * 0.52;
  const Fz_rr = Fz_static * (VP.lf / VP.wheelbase * 2) + dFz_lat * 0.52 - dFz_lon * 0.52;

  // Camber
  const camber_fl = VP.staticCamberF + VP.camberGainF * roll_deg;
  const camber_fr = VP.staticCamberF - VP.camberGainF * roll_deg;

  return { z_fl, z_fr, z_rl, z_rr, Fz_fl, Fz_fr, Fz_rl, Fz_rr, camber_fl, camber_fr };
}

function updateHUD(t, roll_deg, pitch_deg, steer_rad, ay_G, ax_G) {
  const tel = computeTelemetry(roll_deg, pitch_deg, steer_rad, ay_G, ax_G);

  document.getElementById('k-roll').innerHTML  = roll_deg.toFixed(2) + '<span class="ku">°</span>';
  document.getElementById('k-pitch').innerHTML = pitch_deg.toFixed(2) + '<span class="ku">°</span>';
  document.getElementById('k-zfl').innerHTML   = tel.z_fl.toFixed(1) + '<span class="ku">mm</span>';
  document.getElementById('k-zfr').innerHTML   = tel.z_fr.toFixed(1) + '<span class="ku">mm</span>';
  document.getElementById('k-fzfl').innerHTML  = Math.round(tel.Fz_fl) + '<span class="ku">N</span>';
  document.getElementById('k-fzfr').innerHTML  = Math.round(tel.Fz_fr) + '<span class="ku">N</span>';
  document.getElementById('k-ay').innerHTML    = ay_G.toFixed(2) + '<span class="ku">G</span>';
  document.getElementById('k-ax').innerHTML    = ax_G.toFixed(2) + '<span class="ku">G</span>';

  document.getElementById('t-cfl').textContent = tel.camber_fl.toFixed(2) + '°';
  document.getElementById('t-cfr').textContent = tel.camber_fr.toFixed(2) + '°';
  document.getElementById('t-zrl').textContent = tel.z_rl.toFixed(1) + ' mm';
  document.getElementById('t-zrr').textContent = tel.z_rr.toFixed(1) + ' mm';

  document.getElementById('timer').textContent = 'T=' + t.toFixed(2) + 's';
}

// ═════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═════════════════════════════════════════════════════════════════════════

function sampleManeuver(t) {
  const data = MANEUVERS[anim.maneuver];
  const dur = data[data.length-1][0];
  const tClamped = t % dur;

  // Binary search
  let lo = 0, hi = data.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (data[mid][0] <= tClamped) lo = mid; else hi = mid;
  }

  const d0 = data[lo], d1 = data[hi];
  const dt = d1[0] - d0[0];
  const f = dt > 0 ? (tClamped - d0[0]) / dt : 0;

  return {
    roll:  d0[1] + f * (d1[1] - d0[1]),
    pitch: d0[2] + f * (d1[2] - d0[2]),
    steer: d0[3] + f * (d1[3] - d0[3]),
    ay:    d0[4] + f * (d1[4] - d0[4]),
    ax:    d0[5] + f * (d1[5] - d0[5]),
  };
}

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Camera animation
  if (camAnimating) {
    camAnimT += dt * 2.5;
    if (camAnimT >= 1.0) {
      camAnimT = 1.0;
      camAnimating = false;
    }
    const e = easeInOutCubic(camAnimT);
    camTheta = camStartTheta + (targetTheta - camStartTheta) * e;
    camPhi = camStartPhi + (targetPhi - camStartPhi) * e;
    camRadius = camStartRadius + (targetRadius - camStartRadius) * e;
    camTarget.lerpVectors(camStartTarget, targetTarget, e);
  }
  updateCamera();

  // Physics / animation
  if (anim.playing) {
    anim.time += dt * anim.speed;
    const data = MANEUVERS[anim.maneuver];
    const dur = data[data.length-1][0];
    if (anim.time > dur) anim.time = anim.time % dur;

    // Update timeline slider
    document.getElementById('timeline').value = (anim.time / dur) * 1000;
  }

  const s = sampleManeuver(anim.time);

  // Update body matrices first
  bodyGroup.updateMatrixWorld(true);

  updateSuspension(s.roll, s.pitch, s.steer);
  updateHUD(anim.time, s.roll, s.pitch, s.steer, s.ay, s.ax);

  renderer.render(scene, camera);
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

// ═════════════════════════════════════════════════════════════════════════
// CAMERA
// ═════════════════════════════════════════════════════════════════════════

function updateCamera() {
  const x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camRadius * Math.cos(camPhi);
  const z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(
    camTarget.x + x,
    camTarget.y + y,
    camTarget.z + z
  );
  camera.lookAt(camTarget);
}

function animateCamTo(theta, phi, radius, target) {
  camStartTheta = camTheta;
  camStartPhi = camPhi;
  camStartRadius = camRadius;
  camStartTarget = camTarget.clone();
  targetTheta = theta;
  targetPhi = phi;
  targetRadius = radius;
  targetTarget = target;
  camAnimT = 0;
  camAnimating = true;
}

function preset(view) {
  document.querySelectorAll('.vb').forEach(b => b.classList.remove('on'));
  document.getElementById('btn-' + (view === '3q' ? '3q' : view)).classList.add('on');

  switch(view) {
    case '3q':
      animateCamTo(Math.PI * 0.28, Math.PI * 0.22, 3.6, new THREE.Vector3(0, 0.18, 0));
      break;
    case 'front':
      animateCamTo(Math.PI * 0.5, Math.PI * 0.42, 3.0, new THREE.Vector3(0.4, 0.20, 0));
      break;
    case 'side':
      animateCamTo(0.01, Math.PI * 0.42, 3.2, new THREE.Vector3(0, 0.20, 0));
      break;
    case 'top':
      animateCamTo(Math.PI * 0.5, 0.05, 3.5, new THREE.Vector3(0, 0, 0));
      break;
    case 'rear':
      animateCamTo(-Math.PI * 0.5, Math.PI * 0.40, 3.0, new THREE.Vector3(-0.3, 0.20, 0));
      break;
  }
}

// ═════════════════════════════════════════════════════════════════════════
// CONTROLS
// ═════════════════════════════════════════════════════════════════════════

function setupControls() {
  const el = renderer.domElement;

  el.addEventListener('mousedown', e => {
    if (e.button === 0) { isDragging = true; isPanning = false; }
    if (e.button === 2 || (e.button === 0 && e.shiftKey)) { isPanning = true; isDragging = false; }
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
    camAnimating = false;
  });

  el.addEventListener('mousemove', e => {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;

    if (isDragging) {
      camTheta -= dx * 0.005;
      camPhi = Math.max(0.05, Math.min(Math.PI * 0.48, camPhi - dy * 0.005));
    }
    if (isPanning) {
      const right = new THREE.Vector3();
      const up = new THREE.Vector3();
      camera.getWorldDirection(new THREE.Vector3());
      right.crossVectors(camera.up, new THREE.Vector3().subVectors(camTarget, camera.position)).normalize();
      up.copy(camera.up);
      camTarget.addScaledVector(right, -dx * 0.002);
      camTarget.addScaledVector(up, dy * 0.002);
    }
  });

  el.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
  el.addEventListener('contextmenu', e => e.preventDefault());

  el.addEventListener('wheel', e => {
    e.preventDefault();
    camRadius = Math.max(1.5, Math.min(10, camRadius + e.deltaY * 0.003));
    camAnimating = false;
  }, { passive: false });

  // Touch support
  let touchDist = 0;
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      lastMouse.x = e.touches[0].clientX;
      lastMouse.y = e.touches[0].clientY;
      camAnimating = false;
    } else if (e.touches.length === 2) {
      isDragging = false;
      touchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });

  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - lastMouse.x;
      const dy = e.touches[0].clientY - lastMouse.y;
      lastMouse.x = e.touches[0].clientX;
      lastMouse.y = e.touches[0].clientY;
      camTheta -= dx * 0.005;
      camPhi = Math.max(0.05, Math.min(Math.PI * 0.48, camPhi - dy * 0.005));
    } else if (e.touches.length === 2) {
      const nd = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      camRadius = Math.max(1.5, Math.min(10, camRadius * (touchDist / nd)));
      touchDist = nd;
    }
  }, { passive: false });

  el.addEventListener('touchend', () => { isDragging = false; });
}

function togglePlay() {
  anim.playing = !anim.playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = anim.playing ? '▐▐ PAUSE' : '▶ PLAY';
  btn.classList.toggle('active', anim.playing);
}

function resetAnim() {
  anim.time = 0;
  document.getElementById('timeline').value = 0;
}

function seekAnim(val) {
  const data = MANEUVERS[anim.maneuver];
  const dur = data[data.length-1][0];
  anim.time = (val / 1000) * dur;
}

function toggleWire() {
  anim.wireframe = !anim.wireframe;
  document.getElementById('btn-wire').classList.toggle('on', anim.wireframe);
  // Toggle wireframe on all mesh materials
  scene.traverse(obj => {
    if (obj.isMesh && obj.material && obj.material !== MAT.wire) {
      obj.material.wireframe = anim.wireframe;
    }
  });
}

function toggleGround() {
  anim.showGround = !anim.showGround;
  document.getElementById('btn-gnd').classList.toggle('on', anim.showGround);
  groundPlane.visible = anim.showGround;
}

function setManeuver(name) {
  anim.maneuver = name;
  anim.time = 0;
  document.querySelectorAll('.tog .tb[id^="m-"]').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('m-' + name);
  if (btn) btn.classList.add('on');
}

const SPEEDS = [0.25, 0.5, 1.0, 1.5, 2.0];
let speedIdx = 2;
function cycleSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  anim.speed = SPEEDS[speedIdx];
  document.getElementById('speed-lbl').textContent = SPEEDS[speedIdx].toFixed(1) + '×';
}

// ── Init ─────────────────────────────────────────────────────────────────
init();
</script>
